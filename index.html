<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponte Bonita - Catálogo Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --rosa-soft: #f4dcd3; 
            --crema: #fffaf8; 
            --texto: #5a5553; 
            --blanco-tarjeta: #ffffff;
            --rosa-fuerte: #d8b4a6;
            --header-bg: #f7ded5;
            --transicion: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --crema: #1a1817;
            --texto: #f2e9e4;
            --blanco-tarjeta: #252322;
            --rosa-soft: #4a4543;
            --header-bg: #2a2624;
        }

        * { box-sizing: border-box; outline: none; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--crema); 
            font-family: 'Montserrat', sans-serif; 
            color: var(--texto); 
            overflow-x: hidden;
            transition: var(--transicion);
        }

        /* BANNER PRINCIPAL */
        header { 
            width: 100%;
            background-color: var(--header-bg);
            line-height: 0;
        }

        .banner-container {
            width: 100%;
            position: relative;
        }

        .header-banner { 
            width: 100%; 
            height: auto;
            display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        /* BARRA DE NAVEGACIÓN Y BÚSQUEDA REDISEÑADA */
        .nav-container {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--crema);
            padding: 15px 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: var(--transicion);
        }

        .search-wrapper {
            width: 90%;
            max-width: 500px;
            position: relative;
        }

        #searchBar { 
            width: 100%; 
            padding: 14px 25px; 
            padding-left: 50px;
            border: 1px solid var(--rosa-soft);
            border-radius: 50px; 
            background-color: var(--blanco-tarjeta); 
            color: var(--texto); 
            font-family: 'Montserrat';
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .search-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--rosa-fuerte);
        }

        #searchBar:focus {
            border-color: var(--rosa-fuerte);
            box-shadow: 0 0 15px rgba(216, 180, 166, 0.2);
        }

        .social-nav {
            display: flex;
            gap: 20px;
        }

        .social-nav a {
            color: var(--rosa-fuerte);
            font-size: 1.3rem;
            transition: 0.3s;
        }

        .social-nav a:hover { transform: scale(1.1); color: var(--texto); }

        /* GRILLA DE PRODUCTOS */
        .contenedor { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grilla { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }
        
        .tarjeta { 
            cursor: pointer; text-align: center; background: var(--blanco-tarjeta); 
            border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.03); 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .tarjeta:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .foto-contenedor { width: 100%; aspect-ratio: 1 / 1; overflow: hidden; background: #fff; }
        .carru-track { display: flex; width: 100%; height: 100%; transition: transform 0.5s ease; }
        .carru-track img { min-width: 100%; width: 100%; height: 100%; object-fit: cover; }
        
        .info { padding: 20px; }
        .info h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 8px; font-weight: 500; }
        .precio { color: var(--rosa-fuerte); font-weight: 700; font-size: 1.2rem; }

        /* MODAL */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 5000; 
            justify-content: center; align-items: center; opacity: 0;
            transition: opacity 0.4s ease;
        }
        .modal.open { display: flex; opacity: 1; }
        .modal-contenido { 
            display: flex; width: 95%; max-width: 1000px; height: 80vh; 
            background: var(--blanco-tarjeta); position: relative; 
            border-radius: 30px; overflow: hidden;
        }

        .img-box { flex: 1; position: relative; background: #fff; overflow: hidden; cursor: none; display: flex; align-items: center; justify-content: center; }
        #detImg { max-width: 90%; max-height: 90%; object-fit: contain; pointer-events: none; }
        #lupa {
            position: absolute; border: 2px solid var(--rosa-fuerte); border-radius: 50%;
            width: 200px; height: 200px; pointer-events: none; display: none;
            background-repeat: no-repeat; z-index: 5100;
        }

        .detalles-box { flex: 0.8; padding: 40px; display: flex; flex-direction: column; justify-content: center; background-color: var(--crema); }
        .precio-modal { font-size: 2.5rem; color: var(--rosa-fuerte); margin-bottom: 20px; font-weight: 700; }
        
        .btn-wspp { 
            padding: 16px; background: var(--rosa-fuerte); color: white; text-decoration: none; 
            font-weight: 600; text-align: center; border-radius: 50px; 
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }
        .btn-wspp:hover { filter: brightness(1.1); }

        .btn-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.8); color: var(--rosa-fuerte); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 5200; }
        .btn-cerrar { position: absolute; top: 20px; right: 25px; background: none; border: none; font-size: 2rem; color: #d3c9c6; cursor: pointer; z-index: 5300; }

        /* FOOTER */
        footer { text-align: center; padding: 60px 20px; border-top: 1px solid var(--rosa-soft); background: var(--blanco-tarjeta); }
        .brand-name-footer { font-family: 'Great Vibes', cursive; font-size: 3rem; color: var(--rosa-fuerte); margin-bottom: 10px; }
        .disclaimer { font-size: 0.8rem; color: #8a817d; max-width: 600px; margin: 0 auto; line-height: 1.5; }
        .credits { margin-top: 25px; font-weight: bold; color: var(--rosa-fuerte); font-size: 0.85rem; letter-spacing: 2px; }

        .theme-toggle {
            position: fixed; bottom: 25px; right: 25px; z-index: 4000;
            background: var(--rosa-fuerte); color: white; border: none;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center;
        }

        @media (max-width: 800px) { 
            .modal-contenido { flex-direction: column; height: 90vh; } 
            .detalles-box { padding: 30px; text-align: center; }
            #lupa { display: none !important; }
            .img-box { height: 50%; }
        }
    </style>
</head>

            { t: "Set Brochas x5", p: "4.000", items: [{n:"Set", i:"https://i.ibb.co/SDV2bhKf/Set-De-Brochas-X5.jpg"}]},

            { t: "Tei Matte Lip Gloss", p: "4.000", items: [{n:"Cerrado", i:"https://i.ibb.co/hxJj001Z/Tei-Matte-Lip-Gloss-Close.jpg"}, {n:"Abierto", i:"https://i.ibb.co/JwcKCcxY/Tei-Matte-Lip-Gloss-Open.jpg"}]},
            { t: "Tinte Labial", p: "4.000", items: [{n:"Tono 1", i:"https://i.ibb.co/jPw5t2mk/Tinte-Labial1.jpg"}, {n:"Tono 2", i:"https://i.ibb.co/vx5677pZ/Tinte-Labial2.jpg"}]}
        ];

        let pAct = null, iAct = 0, intervals = {};
        const clean = (s) => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

        function render() {
            const g = document.getElementById('miGrilla');
            const q = clean(document.getElementById('searchBar').value);
            g.innerHTML = '';
            db.forEach((p, i) => {
                if (clean(p.t).includes(q)) {
                    let imgs = p.items.map(it => `<img src="${it.i}">`).join('');
                    g.innerHTML += `
                    <div class="tarjeta" onclick="abrir(${i})" onmouseenter="startC(${i})" onmouseleave="stopC(${i})">
                        <div class="foto-contenedor"><div class="carru-track" id="t-${i}">${imgs}</div></div>
                        <div class="info"><h3>${p.t}</h3><div class="precio">$${p.p}</div></div>
                    </div>`;
                }
            });
        }

        function startC(id) {
            const track = document.getElementById(`t-${id}`);
            const count = track.children.length;
            if (count <= 1) return;
            let idx = 0;
            intervals[id] = setInterval(() => {
                idx = (idx + 1) % count;
                track.style.transform = `translateX(-${idx * 100}%)`;
            }, 1400);
        }

        function stopC(id) {
            clearInterval(intervals[id]);
            const track = document.getElementById(`t-${id}`);
            if(track) track.style.transform = 'translateX(0)';
        }

        function abrir(idx) {
            pAct = db[idx]; iAct = 0;
            actualizarModal();
            const m = document.getElementById('miModal');
            m.style.display = 'flex';
            setTimeout(() => m.classList.add('open'), 10);
            document.body.style.overflow = 'hidden';
        }

        function actualizarModal() {
            const it = pAct.items[iAct];
            const img = document.getElementById('detImg');
            const lup = document.getElementById('lupa');
            img.style.opacity = 0;
            img.src = it.i;
            lup.style.backgroundImage = `url('${it.i}')`;
            setTimeout(() => { img.style.opacity = 1; }, 150);
            document.getElementById('detTit').innerText = pAct.t;
            document.getElementById('detTono').innerText = it.n.toLowerCase().includes("tono") ? it.n : "";
            document.getElementById('detPre').innerText = "$" + pAct.p;
            document.getElementById('detLnk').href = `https://wa.me/5493425578649?text=Hola! Consulto por: ${pAct.t}`;
        }

        const imgBox = document.getElementById('imgBox'), lupa = document.getElementById('lupa'), detImg = document.getElementById('detImg');
        imgBox.addEventListener('mousemove', (e) => {
            if(window.innerWidth <= 800) return;
            lupa.style.display = 'block';
            const r = imgBox.getBoundingClientRect();
            const x = e.clientX - r.left, y = e.clientY - r.top;
            lupa.style.left = `${x - 100}px`; lupa.style.top = `${y - 100}px`;
            const z = 2.5;
            lupa.style.backgroundSize = `${detImg.offsetWidth * z}px ${detImg.offsetHeight * z}px`;
            lupa.style.backgroundPosition = `-${(x * z) - 100}px -${(y * z) - 100}px`;
        });
        imgBox.addEventListener('mouseleave', () => lupa.style.display = 'none');

        function cerrar() { 
            const m = document.getElementById('miModal');
            m.classList.remove('open');
            setTimeout(() => m.style.display = 'none', 400);
            document.body.style.overflow = 'auto'; 
        }

        function toggleTheme() {
            const b = document.body;
            const dark = b.getAttribute('data-theme') === 'dark';
            b.setAttribute('data-theme', dark ? 'light' : 'dark');
            document.getElementById('themeBtn').innerHTML = dark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
        }

        document.getElementById('btnPrevModal').onclick = (e) => { e.stopPropagation(); iAct = (iAct - 1 + pAct.items.length) % pAct.items.length; actualizarModal(); };
        document.getElementById('btnNextModal').onclick = (e) => { e.stopPropagation(); iAct = (iAct + 1) % pAct.items.length; actualizarModal(); };

        window.onload = render;
    </script>
</body>
</html>
